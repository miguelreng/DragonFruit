name: Build and lint API

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "preview"
    types:
      - "opened"
      - "synchronize"
      - "ready_for_review"
      - "review_requested"
      - "reopened"
    paths:
      - "apps/api/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.requested_reviewers != null
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.x"
          cache: 'pip'
          cache-dependency-path: 'apps/api/requirements.txt'
      - name: Install Pylint
        run: python -m pip install ruff
      - name: Install API Dependencies
        run: cd apps/api && pip install -r requirements.txt
      - name: Lint apps/api
        run: ruff check --fix apps/api

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.requested_reviewers != null
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: plane
          POSTGRES_PASSWORD: plane
          POSTGRES_DB: plane
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.x"
          cache: 'pip'
          cache-dependency-path: 'apps/api/requirements/test.txt'
      - name: Install API + test dependencies
        run: cd apps/api && pip install -r requirements/test.txt
      - name: Run API test suite
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: plane
          POSTGRES_PASSWORD: plane
          POSTGRES_DB: plane
          REDIS_URL: redis://localhost:6379/
        run: cd apps/api && python -m pytest plane/tests/ -q
