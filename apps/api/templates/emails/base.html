<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>{% block title %}DragonFruit{% endblock %}</title>
    <style>
      body,
      table,
      td,
      p,
      h1,
      h2 {
        margin: 0;
        padding: 0;
      }

      table {
        border-collapse: collapse;
      }

      img {
        border: 0;
        display: block;
        line-height: 100%;
        text-decoration: none;
      }

      @media only screen and (max-width: 640px) {
        .email-shell {
          width: 100% !important;
        }

        .email-cover,
        .email-content,
        .email-footer {
          padding-left: 24px !important;
          padding-right: 24px !important;
        }

        .email-body {
          padding: 20px 12px !important;
        }
      }
    </style>
  </head>
  <body
    bgcolor="#f8f1f6"
    style="
      margin: 0;
      padding: 0;
      width: 100%;
      background-color: #f8f1f6;
      color: #3f3f3f;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    "
  >
    <span
      style="
        display: none;
        max-height: 0;
        max-width: 0;
        overflow: hidden;
        opacity: 0;
        color: transparent;
        font-size: 1px;
        line-height: 1px;
        mso-hide: all;
      "
    >
      {% block preheader %}A message from DragonFruit.{% endblock %}
    </span>

    <table
      role="presentation"
      width="100%"
      bgcolor="#f8f1f6"
      style="width: 100%; background-color: #f8f1f6;"
    >
      <tr>
        <td class="email-body" align="center" style="padding: 40px 16px;">
          <table
            role="presentation"
            width="620"
            class="email-shell"
            style="width: 620px; max-width: 620px;"
          >
            <tr>
              <td
                class="email-cover"
                bgcolor="#aa0276"
                style="
                  padding: 28px 40px;
                  background-color: #aa0276;
                  border-radius: 16px 16px 0 0;
                "
              >
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td
                      width="42"
                      height="42"
                      bgcolor="#ffffff"
                      align="center"
                      valign="middle"
                      style="
                        width: 42px;
                        height: 42px;
                        background-color: #ffffff;
                        border-radius: 12px;
                        text-align: center;
                        vertical-align: middle;
                      "
                    >
                      <img
                        src="https://app.dragonfruit.sh/atlas-dragon.svg"
                        width="25"
                        height="34"
                        alt="DragonFruit"
                        style="display: inline-block; vertical-align: middle;"
                      />
                    </td>
                    <td valign="middle" style="padding-left: 13px; vertical-align: middle;">
                      <p
                        style="
                          color: #ffffff;
                          font-size: 23px;
                          line-height: 1.1;
                          font-weight: 700;
                          letter-spacing: -0.4px;
                        "
                      >
                        DragonFruit
                      </p>
                      <p
                        style="
                          margin-top: 4px;
                          color: #f6d9ec;
                          font-size: 12px;
                          line-height: 1.2;
                          letter-spacing: 0.2px;
                        "
                      >
                        {% block cover_label %}A more thoughtful way to work{% endblock %}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td
                class="email-content"
                bgcolor="#ffffff"
                style="
                  padding: 40px;
                  background-color: #ffffff;
                  border-left: 1px solid #eadde6;
                  border-right: 1px solid #eadde6;
                  color: #3f3f3f;
                  font-size: 15px;
                  line-height: 1.6;
                "
              >
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td
                class="email-footer"
                bgcolor="#ffffff"
                style="
                  padding: 0 40px 24px;
                  background-color: #ffffff;
                  border: 1px solid #eadde6;
                  border-top: 0;
                  border-radius: 0 0 16px 16px;
                "
              >
                <div style="border-top: 1px solid #eadde6; padding-top: 20px;">
                  <p style="color: #8c7886; font-size: 12px; line-height: 1.5;">
                    {% block footer %}
                      Sent by
                      <a
                        href="https://app.dragonfruit.sh"
                        target="_blank"
                        style="color: #aa0276; text-decoration: none;"
                        >DragonFruit</a
                      >.
                    {% endblock %}
                  </p>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
