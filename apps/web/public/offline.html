<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Dragon Fruit is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Figtree Variable",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f7f7f4;
        color: #202124;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 360px);
        border: 1px solid #dfdfd8;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 1px 2px rgba(41, 47, 61, 0.08);
      }

      img {
        width: 44px;
        height: 44px;
        border-radius: 10px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 20px;
        color: #666a73;
        font-size: 14px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        background: #8a0052;
        color: #ffffff;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #171717;
          color: #f7f7f4;
        }

        main {
          border-color: #333333;
          background: #202020;
        }

        p {
          color: #b5b7bc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192x192.png" alt="" />
      <h1>Dragon Fruit is offline</h1>
      <p>Reconnect to continue syncing your workspace.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
