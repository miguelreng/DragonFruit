<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DragonFruit Bookmarks</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <header class="app-header">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">D</span>
          <div>
            <strong>DragonFruit</strong>
            <span>Bookmarks</span>
          </div>
        </div>
        <span class="header-pill">Chrome</span>
      </header>

      <section class="card">
        <div class="section-heading">
          <span>Destination</span>
          <span id="status" class="status">Not configured</span>
        </div>
        <label>
          <span>App URL</span>
          <input id="app-url" type="url" placeholder="http://localhost:3000" />
        </label>
        <label>
          <span>Workspace slug</span>
          <input id="workspace-slug" type="text" placeholder="workspace" />
        </label>
        <button id="load-projects" type="button" class="secondary">Load writable projects</button>
        <label>
          <span>Project</span>
          <select id="project-id"></select>
        </label>
      </section>

      <button id="save-page" type="button" class="primary">
        <span class="button-icon" aria-hidden="true">⌘</span>
        Save current page
      </button>
    </main>
    <script src="./popup.js" type="module"></script>
  </body>
</html>
