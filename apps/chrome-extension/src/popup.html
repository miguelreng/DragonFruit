<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DragonFruit Bookmarks</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <header class="app-header">
        <img class="brand-logo" src="./logo.svg" alt="DragonFruit" />
        <span>Bookmarks</span>
      </header>

      <section class="card action-card">
        <span class="section-label">Bookmark</span>
        <div class="action-copy">
          <strong>Save the current Chrome page.</strong>
          <span>Right-click pages, links, and images for more save actions.</span>
        </div>
        <button id="save-page" type="button" class="primary">Save current page</button>
      </section>

      <section class="card settings-card">
        <div class="settings-title">
          <span class="section-label">Settings</span>
          <span aria-hidden="true">⌃</span>
        </div>

        <label class="setting-row">
          <span>App URL</span>
          <input id="app-url" type="url" placeholder="http://localhost:3000" />
        </label>
        <label class="setting-row">
          <span>Workspace</span>
          <input id="workspace-slug" type="text" placeholder="workspace" />
        </label>
        <label class="setting-row">
          <span>Project</span>
          <select id="project-id"></select>
        </label>

        <button id="load-projects" type="button" class="secondary">Load writable projects</button>
      </section>

      <footer>
        <span id="status" class="status">Not configured</span>
      </footer>
    </main>
    <script src="./popup.js" type="module"></script>
  </body>
</html>
